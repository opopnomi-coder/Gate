services:
  - type: web
    name: rit-transport-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false # Set in Render: jdbc:mysql://centerbeam.proxy.rlwy.net:58876/railway?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Set in Render: root
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set in Render Dashboard
      - key: BACKEND_BASE_URL
        value: https://ritgate-backend.onrender.com
      # Brevo HTTP API key — get from Brevo dashboard -> API Keys tab
      - key: BREVO_API_KEY
        sync: false # Set in Render Dashboard
      - key: BREVO_SENDER_EMAIL
        sync: false # Set to your verified sender email in Brevo
